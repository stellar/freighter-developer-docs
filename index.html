<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Freighter Playgrounds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://rsms.me/">
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/themes/vue.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <script>
    // Inline so it runs before paint and avoids a flash-of-wrong-theme on
    // dark-mode systems. Follows OS prefers-color-scheme (no user toggle,
    // matching GitBook's behavior on docs.freighter.app).
    (function () {
      var mql = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      var apply = function () {
        document.documentElement.setAttribute('data-theme', mql && mql.matches ? 'dark' : 'light');
      };
      apply();
      if (!mql) return;
      if (mql.addEventListener) mql.addEventListener('change', apply);
      else if (mql.addListener) mql.addListener(apply); // Safari < 14
    })();
  </script>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Freighter Playgrounds',
      homepage: 'playgrounds-home.md',
      loadSidebar: '_sidebar.md',
      auto2top: true,
      executeScript: true,
    };
  </script>
  <script src="playground.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://unpkg.com/@stellar/freighter-api@6.0.1/build/index.min.js"></script>
</body>
</html>
